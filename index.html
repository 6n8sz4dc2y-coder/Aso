<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RRG Group Dashboard</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--ink:#141824;--muted:#667085;--line:#e5e7eb;--green:#16a34a;--amber:#f59e0b;--red:#dc2626;--blue:#2563eb;}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{background:#111827;color:white;padding:28px 22px} header h1{margin:0;font-size:30px;letter-spacing:-.04em} header p{margin:8px 0 0;color:#cbd5e1}
main{max-width:1180px;margin:0 auto;padding:22px} .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px} .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 6px 20px rgba(15,23,42,.04)}
.kpi .label{color:var(--muted);font-size:14px} .kpi .value{font-size:34px;font-weight:800;letter-spacing:-.04em;margin-top:8px} .kpi .sub{color:var(--muted);font-size:13px;margin-top:6px}
.summary{margin:18px 0;display:grid;grid-template-columns:2fr 1fr;gap:14px} h2{margin:0 0 14px;font-size:20px;letter-spacing:-.02em} .insight{font-size:18px;line-height:1.45}
.pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700} .green{background:#dcfce7;color:#166534} .amber{background:#fef3c7;color:#92400e} .red{background:#fee2e2;color:#991b1b}
table{width:100%;border-collapse:collapse;background:white;border-radius:18px;overflow:hidden;border:1px solid var(--line)} th,td{padding:13px 12px;border-bottom:1px solid var(--line);text-align:left} th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;background:#f8fafc} td.num, th.num{text-align:right} tr:last-child td{border-bottom:0} .bold{font-weight:800} .group{font-weight:800;background:#fffef0} .bar{height:9px;background:#eef2f7;border-radius:20px;overflow:hidden;min-width:110px} .bar span{display:block;height:100%;background:var(--blue);border-radius:20px} .section{margin-top:18px} .small{font-size:13px;color:var(--muted)}
@media(max-width:800px){.grid,.summary{grid-template-columns:1fr} header h1{font-size:25px} main{padding:14px} table{font-size:13px} th,td{padding:10px 8px} .hide-mobile{display:none}}
</style>
</head>
<body>
<header><h1>RRG Group Dashboard</h1><p>Simple static dashboard. Upload this <b>index.html</b> to GitHub Pages.</p></header>
<main>
<div class="grid" id="kpis"></div>
<div class="summary">
  <div class="card"><h2>Executive summary</h2><div class="insight" id="insight"></div></div>
  <div class="card"><h2>Focus</h2><div id="focus"></div></div>
</div>
<div class="section card"><h2>Q3 registrations</h2><div style="overflow:auto"><table id="table"></table></div></div>
</main>
<script>
const rows = [{"centre": "Bolton", "group": "North CDA", "jul": 0, "julTarget": 0, "aug": 0, "augTarget": 0, "sep": 0, "sepTarget": 0, "total": 0, "target": 105, "toGo": 105, "perWeek": 8, "qtrRegs": 0, "qtrTarget": 105, "pct": 0.0}, {"centre": "Bury", "group": "North CDA", "jul": 0, "julTarget": 0, "aug": 0, "augTarget": 0, "sep": 0, "sepTarget": 0, "total": 0, "target": 77, "toGo": 77, "perWeek": 6, "qtrRegs": 0, "qtrTarget": 77, "pct": 0.0}, {"centre": "Rochdale", "group": "North CDA", "jul": 0, "julTarget": 0, "aug": 0, "augTarget": 0, "sep": 0, "sepTarget": 0, "total": 0, "target": 85, "toGo": 85, "perWeek": 7, "qtrRegs": 0, "qtrTarget": 85, "pct": 0.0}, {"centre": "SQ", "group": "North CDA", "jul": 0, "julTarget": 0, "aug": 0, "augTarget": 0, "sep": 0, "sepTarget": 0, "total": 0, "target": 140, "toGo": 140, "perWeek": 11, "qtrRegs": 0, "qtrTarget": 140, "pct": 0.0}, {"centre": "NORTH CDA", "group": "North CDA", "jul": 0, "julTarget": 0, "aug": 0, "augTarget": 0, "sep": 0, "sepTarget": 0, "total": 0, "target": 407, "toGo": 407, "perWeek": 32, "qtrRegs": 0, "qtrTarget": 407, "pct": 0.0}, {"centre": "Bradford", "group": "West Yorkshire", "jul": 0, "julTarget": 0, "aug": 0, "augTarget": 0, "sep": 0, "sepTarget": 0, "total": 0, "target": 105, "toGo": 105, "perWeek": 8, "qtrRegs": 0, "qtrTarget": 105, "pct": 0.0}, {"centre": "Huddersfield", "group": "West Yorkshire", "jul": 0, "julTarget": 0, "aug": 0, "augTarget": 0, "sep": 0, "sepTarget": 0, "total": 0, "target": 108, "toGo": 108, "perWeek": 9, "qtrRegs": 0, "qtrTarget": 108, "pct": 0.0}, {"centre": "Silsden", "group": "West Yorkshire", "jul": 0, "julTarget": 0, "aug": 0, "augTarget": 0, "sep": 0, "sepTarget": 0, "total": 0, "target": 34, "toGo": 34, "perWeek": 3, "qtrRegs": 0, "qtrTarget": 34, "pct": 0.0}, {"centre": "WY CDA", "group": "West Yorkshire", "jul": 0, "julTarget": 0, "aug": 0, "augTarget": 0, "sep": 0, "sepTarget": 0, "total": 0, "target": 247, "toGo": 247, "perWeek": 20, "qtrRegs": 0, "qtrTarget": 247, "pct": 0.0}];
const centres = rows.filter(r=>!r.centre.includes('CDA') && r.centre !== 'TOTAL');
const groups = rows.filter(r=>r.centre.includes('CDA') || r.centre === 'TOTAL');
function pct(r){ return r.target ? Math.round((r.total/r.target)*100) : 0; }
function status(p){ return p>=100?'green':p>=90?'amber':'red'; }
function fmt(n){ return Number(n||0).toLocaleString('en-GB'); }
const total = rows.find(r=>r.centre==='WY CDA') || groups[groups.length-1];
const north = rows.find(r=>r.centre==='NORTH CDA');
const wy = rows.find(r=>r.centre==='WY CDA');
const top = [...centres].sort((a,b)=>pct(b)-pct(a))[0];
const low = [...centres].sort((a,b)=>pct(a)-pct(b))[0];
document.getElementById('kpis').innerHTML = `
  <div class="card kpi"><div class="label">North CDA</div><div class="value">${pct(north)}%</div><div class="sub">${fmt(north.total)} / ${fmt(north.target)} registrations</div></div>
  <div class="card kpi"><div class="label">West Yorkshire</div><div class="value">${pct(wy)}%</div><div class="sub">${fmt(wy.total)} / ${fmt(wy.target)} registrations</div></div>
  <div class="card kpi"><div class="label">Top centre</div><div class="value">${top.centre}</div><div class="sub">${pct(top)}% to target</div></div>
  <div class="card kpi"><div class="label">Needs attention</div><div class="value">${low.centre}</div><div class="sub">${pct(low)}% to target</div></div>`;
document.getElementById('insight').innerHTML = `West Yorkshire is currently at <b>${pct(wy)}%</b> of target. North CDA is at <b>${pct(north)}%</b>. The biggest focus centre is <b>${low.centre}</b>, while <b>${top.centre}</b> is currently strongest against target.`;
document.getElementById('focus').innerHTML = centres.sort((a,b)=>pct(a)-pct(b)).slice(0,3).map(r=>`<p><span class="pill ${status(pct(r))}">${pct(r)}%</span> <b>${r.centre}</b><br><span class="small">To go: ${fmt(r.toGo)} | Per week: ${fmt(r.perWeek)}</span></p>`).join('');
const body = rows.map(r=>{ const p=pct(r); const cls=(r.centre.includes('CDA')||r.centre==='TOTAL')?'group':''; return `<tr class="${cls}"><td class="bold">${r.centre}</td><td class="num">${fmt(r.julTarget)}</td><td class="num">${fmt(r.augTarget)}</td><td class="num">${fmt(r.sepTarget)}</td><td class="num bold">${fmt(r.total)}</td><td class="num">${fmt(r.target)}</td><td><div class="bar"><span style="width:${Math.min(100,p)}%"></span></div></td><td class="num"><span class="pill ${status(p)}">${p}%</span></td><td class="num">${fmt(r.toGo)}</td><td class="num hide-mobile">${fmt(r.perWeek)}</td></tr>`; }).join('');
document.getElementById('table').innerHTML = `<thead><tr><th>Centre</th><th class="num">Jul target</th><th class="num">Aug target</th><th class="num">Sep target</th><th class="num">Actual</th><th class="num">Target</th><th>Progress</th><th class="num">%</th><th class="num">To go</th><th class="num hide-mobile">Per week</th></tr></thead><tbody>${body}</tbody>`;
</script>
</body>
</html>
